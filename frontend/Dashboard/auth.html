<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PT Mitra Distribusi — Auth</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    /* ─── Variables ─── */
    :root {
      --primary:     #2B5EE8;
      --primary-hov: #1F4DC5;
      --text-dark:   #1A1D2E;
      --text-mid:    #5A607A;
      --text-light:  #9AA3B8;
      --border:      #D6DCE8;
      --border-focus:#2B5EE8;
      --bg:          #F5F7FB;
      --surface:     #FFFFFF;
      --error:       #E84B3A;
      --radius:      10px;
      --font:        'Plus Jakarta Sans', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      background: var(--surface);
      color: var(--text-dark);
      min-height: 100vh;
      display: flex;
      align-items: stretch;
    }

    /* ══════════ LAYOUT ══════════ */
    .auth-wrapper {
      display: flex;
      width: 100%;
      min-height: 100vh;
    }

    /* ── Left panel - hidden ── */
    .auth-left {
      display: none;
      flex: 1;
      align-items: center;
      justify-content: center;
      background: var(--surface);
      padding: 60px 40px;
    }

    .brand {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 20px;
      max-width: 360px;
    }

    .brand-logo {
      width: 220px;
      height: 200px;
      background: var(--bg);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
      color: var(--text-light);
      letter-spacing: .04em;
      text-align: center;
    }

    .brand-text { margin-top: 8px; }
    .brand-text .brand-pt {
      display: block;
      font-size: 16px;
      font-weight: 600;
      color: var(--text-mid);
      letter-spacing: .06em;
    }
    .brand-text .brand-name {
      display: block;
      font-size: 32px;
      font-weight: 800;
      color: var(--text-dark);
      line-height: 1.1;
      letter-spacing: -.5px;
    }
    .brand-text .brand-tagline {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-light);
      letter-spacing: .12em;
      text-transform: uppercase;
      margin-top: 6px;
    }

    .auth-divider { display: none; }

    /* ── Right panel ── */
    .auth-right {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 40px;
      background: var(--surface);
    }

    /* ══════════ FORM CARD ══════════ */
    .form-card {
      width: 100%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    .form-logo {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      font-weight: 700;
      color: var(--text-light);
      text-align: center;
      margin-bottom: 18px;
    }

    .form-title {
      font-size: 24px;
      font-weight: 800;
      color: var(--text-dark);
      text-align: center;
      letter-spacing: -.4px;
    }

    .form-subtitle {
      font-size: 13.5px;
      color: var(--text-mid);
      text-align: center;
      margin-top: 6px;
      margin-bottom: 28px;
    }

    .form-body {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-dark);
    }

    .field input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      font-family: var(--font);
      font-size: 13.5px;
      color: var(--text-dark);
      background: var(--surface);
      outline: none;
      transition: border-color .18s, box-shadow .18s;
    }
    .field input::placeholder { color: var(--text-light); }
    .field input:focus {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px rgba(43,94,232,.12);
    }

    /* ── Password Field Wrapper & Eye Button ── */
    .password-wrapper {
      position: relative;
      width: 100%;
    }
    
    .password-wrapper input {
      padding-right: 44px; /* Memberi ruang untuk tombol mata di kanan */
    }
    
    /* MENYEMBUNYIKAN IKON MATA BAWAAN BROWSER (EDGE / IE / CHROME MODERN) */
    .password-wrapper input::-ms-reveal,
    .password-wrapper input::-ms-clear {
      display: none !important;
    }
    
    .toggle-password-btn {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-mid);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4px;
      user-select: none;
      outline: none;
      transition: color 0.18s;
    }
    
    .toggle-password-btn:hover {
      color: var(--primary);
    }

    .field-hint {
      font-size: 11.5px;
      color: var(--text-light);
      margin-top: -4px;
    }

    .btn-primary {
      width: 100%;
      padding: 12px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-family: var(--font);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: background .18s, transform .1s;
      letter-spacing: .01em;
    }
    .btn-primary:hover  { background: var(--primary-hov); }
    .btn-primary:active { transform: scale(.98); }

    .form-switch {
      font-size: 13px;
      color: var(--text-mid);
      text-align: center;
      margin-top: 8px;
    }
    .form-switch a {
      color: var(--primary);
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
    }
    .form-switch a:hover { text-decoration: underline; }

    #form-signup { display: none; }

    @media (max-width: 700px) {
      .auth-left    { display: none; }
      .auth-divider { display: none; }
      .auth-right   { padding: 40px 24px; }
    }
  </style>
</head>
<body>

<div class="auth-wrapper">

  <div class="auth-left">
    <div class="brand">
      <img src="assets/Object.svg" alt="PT Mitra Distribusi" width="220" class="brand-logo">
      <div class="brand-text">
        <span class="brand-pt">PT</span>
        <span class="brand-name">Mitra Distribusi</span>
        <span class="brand-tagline">Global Industrial Logistics &amp; Supply Chain</span>
      </div>
    </div>
  </div>

  <div class="auth-divider"></div>

  <div class="auth-right">

    <div class="form-card" id="form-login">
      <img src="assets/Object.svg" alt="Logo" width="48" height="48" class="form-logo">
      <h1 class="form-title">Log in to your account</h1>
      <p class="form-subtitle">Welcome back! Please enter your details.</p>

      <div class="form-body">
        <div class="field">
          <label for="login-identifier">Nama atau Email</label>
          <input type="text" id="login-identifier" placeholder="Masukkan nama atau email Anda" autocomplete="username"/>
        </div>

        <div class="field">
          <label for="login-password">Password</label>
          <div class="password-wrapper">
            <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password"/>
            <button type="button" class="toggle-password-btn" onclick="togglePasswordVisibility('login-password', this)">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            </button>
          </div>
        </div>

        <button class="btn-primary" onclick="handleLogin()">Sign in</button>

        <p class="form-switch">
          Don't have an account?
          <a onclick="showSignup()">Sign up</a>
        </p>
      </div>
    </div>


    <div class="form-card" id="form-signup">
      <img src="assets/Object.svg" alt="Logo" width="48" height="48" class="form-logo">
      <h1 class="form-title">Create an account</h1>
      <p class="form-subtitle">Start your Journey</p>

      <div class="form-body">
        <div class="field">
          <label for="signup-name">Name*</label>
          <input type="text" id="signup-name" placeholder="Enter your name" autocomplete="name"/>
        </div>

        <div class="field">
          <label for="signup-email">Email*</label>
          <input type="email" id="signup-email" placeholder="Enter your email" autocomplete="email"/>
        </div>

        <div class="field">
          <label for="signup-password">Password*</label>
          <div class="password-wrapper">
            <input type="password" id="signup-password" placeholder="Create a password" autocomplete="new-password"/>
            <button type="button" class="toggle-password-btn" onclick="togglePasswordVisibility('signup-password', this)">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            </button>
          </div>
          <span class="field-hint">Must be at least 8 characters.</span>
        </div>

        <button class="btn-primary" onclick="handleSignup()">Get started</button>

        <p class="form-switch">
          Already have an account?
          <a onclick="showLogin()">Log in</a>
        </p>
      </div>
    </div>

  </div>
</div>

<script>
  function showSignup() {
    document.getElementById('form-login').style.display  = 'none';
    document.getElementById('form-signup').style.display = 'flex';
  }
  function showLogin() {
    document.getElementById('form-signup').style.display = 'none';
    document.getElementById('form-login').style.display  = 'flex';
  }

  // Fungsi Toggle Mata
  function togglePasswordVisibility(inputId, buttonElement) {
    const passwordInput = document.getElementById(inputId);
    if (!passwordInput) return;

    if (passwordInput.type === 'password') {
      passwordInput.type = 'text';
      buttonElement.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>`;
    } else {
      passwordInput.type = 'password';
      buttonElement.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>`;
    }
  }

  // Fitur Tekan Enter untuk Kirim Data
  document.addEventListener("DOMContentLoaded", function() {
    const loginInputs = document.querySelectorAll("#form-login input");
    loginInputs.forEach(input => {
      input.addEventListener("keydown", function(event) {
        if (event.key === "Enter") {
          event.preventDefault();
          handleLogin();
        }
      });
    });

    const signupInputs = document.querySelectorAll("#form-signup input");
    signupInputs.forEach(input => {
      input.addEventListener("keydown", function(event) {
        if (event.key === "Enter") {
          event.preventDefault();
          handleSignup();
        }
      });
    });
  });

  // Handler Login
  function handleLogin() {
    const identifier = document.getElementById('login-identifier').value;
    const password = document.getElementById('login-password').value;
    
    if (!identifier || !password) {
      alert('Silakan isi nama/email dan password');
      return;
    }

    fetch('http://localhost:3000/users/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ identifier, password })
    })
    .then(response => response.json())
    .then(data => {
      if (data.user) {
        localStorage.setItem('user', JSON.stringify(data.user));
        localStorage.setItem('email', data.user.email);
        localStorage.setItem('role', data.user.role);
        
        if (data.user.role === 'admin') {
          window.location.replace('dashboard.html');
        } else {
          window.location.replace('customer_dashboard.html');
        }
      } else {
        alert(data.message || 'Nama/Email atau password salah!');
      }
    })
    .catch(error => {
      console.error('Error:', error);
      alert('Terjadi kesalahan saat login. Pastikan backend server berjalan!');
    });
  }
  
  // Handler Sign Up
  function handleSignup() {
    const name = document.getElementById('signup-name').value;
    const email = document.getElementById('signup-email').value;
    const password = document.getElementById('signup-password').value;
    
    if (!name || !email || !password) {
      alert('Silakan isi semua field yang diperlukan');
      return;
    }
    
    if (password.length < 8) {
      alert('Password harus minimal 8 karakter');
      return;
    }

    let role = 'customer';
    if (email.trim().toLowerCase() === 'admin@mitradistribusi.com') {
      role = 'admin';
    }
    
    fetch('http://localhost:3000/users', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, email, password, role })
    })
    .then(response => response.json())
    .then(data => {
      if (data.message === 'User berhasil ditambahkan' || data.user) {
        const activeUser = data.user || { name, email, role };
        
        localStorage.setItem('user', JSON.stringify(activeUser));
        localStorage.setItem('email', email);
        localStorage.setItem('role', role);

        if (role === 'admin') {
          window.location.replace('dashboard.html');
        } else {
          window.location.replace('customer_dashboard.html');
        }
      } else {
        alert(data.message || 'Gagal membuat akun');
      }
    })
    .catch(error => {
      console.error('Error:', error);
      alert('Terjadi kesalahan saat membuat akun. Pastikan backend server berjalan!');
    });
  }
</script>

</body>
</html>
