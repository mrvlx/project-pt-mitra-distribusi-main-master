<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tambah Purchase Order - PT Mitra Distribusi</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #F4F6FB;
      --surface: #FFFFFF;
      --primary: #2B5EE8;
      --text-dark: #1A1D2E;
      --text-mid: #5A607A;
      --border: #E8ECF4;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(30,40,80,.07);
      --font: 'Plus Jakarta Sans', sans-serif;
      --red: #EF4444;
      --green: #22C55E;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: var(--font); background: var(--bg); padding: 40px; color: var(--text-dark); }
    .container { max-width: 780px; margin: auto; }
    .page-title { font-size: 28px; font-weight: 800; margin-bottom: 24px; }
    .card { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); border: 1px solid var(--border); padding: 32px; margin-bottom: 20px; }
    .section-title { font-size: 15px; font-weight: 700; color: var(--text-dark); margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .form-group { display: flex; flex-direction: column; gap: 8px; }
    label { font-size: 13px; font-weight: 600; color: var(--text-mid); }
    input, select {
      width: 100%; padding: 12px 14px;
      border: 1.5px solid var(--border); border-radius: 10px;
      outline: none; font-family: var(--font); font-size: 14px;
      transition: .2s; background: white;
    }
    input:focus, select:focus { border-color: var(--primary); }

    /* Product rows */
    .product-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 16px; }
    .product-row {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 1fr 40px;
      gap: 10px; align-items: center;
    }
    .product-row input, .product-row select { padding: 10px 12px; font-size: 13px; }
    .subtotal-display {
      font-size: 13px; font-weight: 600; color: var(--text-dark);
      background: var(--bg); border: 1.5px solid var(--border);
      border-radius: 10px; padding: 10px 12px; text-align: right;
    }
    .btn-remove {
      width: 36px; height: 36px; border-radius: 8px;
      background: #FEE2E2; color: var(--red); border: none;
      font-size: 18px; cursor: pointer; display: flex;
      align-items: center; justify-content: center; font-weight: 700;
      transition: .2s; flex-shrink: 0;
    }
    .btn-remove:hover { background: #FECACA; }

    .product-header {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 1fr 40px;
      gap: 10px; margin-bottom: 8px;
    }
    .product-header span { font-size: 12px; font-weight: 600; color: var(--text-mid); }

    .btn-add-product {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 16px; background: var(--bg);
      border: 1.5px dashed var(--border); border-radius: 10px;
      color: var(--primary); font-family: var(--font);
      font-size: 13px; font-weight: 600; cursor: pointer;
      transition: .2s; width: 100%;
    }
    .btn-add-product:hover { border-color: var(--primary); background: #EEF2FD; }

    .total-section {
      display: flex; justify-content: flex-end; align-items: center;
      gap: 16px; padding-top: 16px; border-top: 1px solid var(--border);
      margin-top: 16px;
    }
    .total-label { font-size: 14px; font-weight: 600; color: var(--text-mid); }
    .total-value { font-size: 20px; font-weight: 800; color: var(--text-dark); }

    .button-group { display: flex; justify-content: flex-end; gap: 12px; margin-top: 8px; }
    .btn { padding: 13px 22px; border: none; border-radius: 10px; font-family: var(--font); font-weight: 700; cursor: pointer; transition: .2s; text-decoration: none; font-size: 14px; }
    .btn-secondary { background: #E9EDF7; color: var(--text-dark); }
    .btn-secondary:hover { background: #DCE3F2; }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: #1F4DC5; }
    .message { margin-top: 20px; padding: 14px; border-radius: 10px; font-size: 14px; display: none; }
    .success { background: #E5F9F0; color: #16A34A; }
    .error { background: #FDECEA; color: #DC2626; }
  </style>
</head>
<body>

<div class="container">
  <h1 class="page-title">Tambah Purchase Order</h1>

  <div class="card">
    <div class="section-title">📋 Informasi Purchase Order</div>
    <div class="form-grid">

      <div class="form-group">
        <label>Pemasok</label>
        <select id="id_pemasok" required>
          <option value="">Memuat pemasok...</option>
        </select>
      </div>

      <div class="form-group">
        <label>Gudang Tujuan</label>
        <select id="id_gudang" required>
          <option value="">Memuat gudang...</option>
        </select>
      </div>

      <div class="form-group">
        <label>Tanggal PO</label>
        <input type="date" id="tanggal_po" required>
      </div>

      <div class="form-group">
        <label>Status PO</label>
        <select id="status_po" required>
          <option value="Draft">Draft</option>
          <option value="Sent">Sent</option>
          <option value="Received">Received</option>
          <option value="Cancelled">Cancelled</option>
        </select>
      </div>

    </div>
  </div>

  <div class="card">
    <div class="section-title">📦 Detail Produk</div>

    <div class="product-header">
      <span>Pilih Produk</span>
      <span>Qty</span>
      <span>Harga Beli (Rp)</span>
      <span>Subtotal</span>
      <span></span>
    </div>

    <div class="product-list" id="productList"></div>

    <button type="button" class="btn-add-product" onclick="addProductRow()">
      + Tambah Produk
    </button>

    <div class="total-section">
      <span class="total-label">Total Bayar:</span>
      <span class="total-value" id="totalDisplay">Rp 0</span>
    </div>
  </div>

  <div class="button-group">
    <a href="purchase.html" class="btn btn-secondary">Kembali</a>
    <button type="button" class="btn btn-primary" onclick="submitPO()">Simpan Purchase Order</button>
  </div>

  <div id="message-box" class="message"></div>
</div>

<script>
const BASE_URL = 'http://localhost:3000';
const messageBox = document.getElementById('message-box');
let rowCount = 0;
let produkList = []; // Menyimpan master data produk untuk dropdown

// Default tanggal hari ini
const today = new Date().toISOString().split('T')[0];
document.getElementById('tanggal_po').value = today;

// Load pemasok
async function loadPemasok() {
  try {
    const res = await fetch(`${BASE_URL}/pemasok`);
    const data = await res.json();
    const sel = document.getElementById('id_pemasok');
    sel.innerHTML = '<option value="">Pilih Pemasok</option>';
    data.forEach(p => {
      sel.innerHTML += `<option value="${p.id_pemasok}">${p.nama_pemasok}</option>`;
    });
  } catch (e) {
    document.getElementById('id_pemasok').innerHTML = '<option>Gagal memuat</option>';
  }
}

// Load gudang
async function loadGudang() {
  try {
    const res = await fetch(`${BASE_URL}/gudang`);
    const data = await res.json();
    const sel = document.getElementById('id_gudang');
    sel.innerHTML = '<option value="">Pilih Gudang</option>';
    data.forEach(g => {
      sel.innerHTML += `<option value="${g.id_gudang}">${g.nama_gudang}</option>`;
    });
  } catch (e) {
    document.getElementById('id_gudang').innerHTML = '<option>Gagal memuat</option>';
  }
}

// 🔥 TAMBAHAN: Load Data Produk untuk Dropdown di baris detail
async function loadProduk() {
  try {
    const res = await fetch(`${BASE_URL}/produk`);
    produkList = await res.json();
  } catch (e) {
    console.error("Gagal memuat produk untuk dropdown", e);
  }
}

// Tambah row produk (Sekarang menggunakan Dropdown Select Nama Produk)
function addProductRow() {
  rowCount++;
  const id = `row_${rowCount}`;
  const list = document.getElementById('productList');

  // Bikin list pilihan produk dari master data
  let produkOptions = '<option value="">-- Pilih Produk --</option>';
  produkList.forEach(p => {
    produkOptions += `<option value="${p.id_produk}">${p.nama_produk}</option>`;
  });

  const row = document.createElement('div');
  row.className = 'product-row';
  row.id = id;
  row.innerHTML = `
    <select class="id_produk" onchange="handleProductSelect('${id}')" required>
      ${produkOptions}
    </select>
    <input type="number" placeholder="Qty" class="qty" min="1" value="1" oninput="calcSubtotal('${id}')">
    <input type="number" placeholder="Harga Beli" class="harga_beli" min="0" oninput="calcSubtotal('${id}')">
    <div class="subtotal-display" id="sub_${id}">Rp 0</div>
    <button type="button" class="btn-remove" onclick="removeRow('${id}')">×</button>
  `;
  list.appendChild(row);
}

// 🔥 TAMBAHAN: Ketika produk dipilih di dropdown, otomatis isi default harga belinya
function handleProductSelect(id) {
  const row = document.getElementById(id);
  const selectProduk = row.querySelector('.id_produk');
  const inputHarga = row.querySelector('.harga_beli');
  
  const selectedId = parseInt(selectProduk.value);
  const produkYangDipilih = produkList.find(p => p.id_produk === selectedId);
  
  if (produkYangDipilih) {
    // Otomatis isi kolom harga jika ada field harga_beli atau harga di tabel produk kamu
    inputHarga.value = produkYangDipilih.harga_beli || produkYangDipilih.harga || 0;
  }
  calcSubtotal(id);
}

// Hitung subtotal per row
function calcSubtotal(id) {
  const row = document.getElementById(id);
  const qty = parseFloat(row.querySelector('.qty').value) || 0;
  const harga = parseFloat(row.querySelector('.harga_beli').value) || 0;
  const sub = qty * harga;
  row.querySelector(`#sub_${id}`).textContent = 'Rp ' + sub.toLocaleString('id-ID');
  updateTotal();
}

// Update total
function updateTotal() {
  const rows = document.querySelectorAll('.product-row');
  let total = 0;
  rows.forEach(row => {
    const qty = parseFloat(row.querySelector('.qty').value) || 0;
    const harga = parseFloat(row.querySelector('.harga_beli').value) || 0;
    total += qty * harga;
  });
  document.getElementById('totalDisplay').textContent = 'Rp ' + total.toLocaleString('id-ID');
}

// Hapus row
function removeRow(id) {
  document.getElementById(id).remove();
  updateTotal();
}

// 🔥 PERBAIKAN TOTAL: Submit PO langsung mengirim array items dalam satu request tunggal
async function submitPO() {
  const rows = document.querySelectorAll('.product-row');

  if (rows.length === 0) {
    showMessage('error', 'Tambahkan minimal 1 produk!');
    return;
  }

  const id_pemasok = parseInt(document.getElementById('id_pemasok').value);
  const id_gudang  = parseInt(document.getElementById('id_gudang').value);

  if (!id_pemasok || !id_gudang) {
    showMessage('error', 'Pemasok dan Gudang wajib dipilih!');
    return;
  }

  const items = [];
  let total = 0;
  let valid = true;

  rows.forEach(row => {
    const id_produk  = parseInt(row.querySelector('.id_produk').value);
    const qty        = parseInt(row.querySelector('.qty').value);
    const harga_beli = parseFloat(row.querySelector('.harga_beli').value);
    const subtotal   = qty * harga_beli;

    if (!id_produk || !qty || !harga_beli) { valid = false; return; }

    items.push({ id_produk, qty, harga_beli, subtotal });
    total += subtotal;
  });

  if (!valid) {
    showMessage('error', 'Lengkapi semua data produk dan harganya!');
    return;
  }

  // Gabungkan info utama dengan array items langsung ke dalam 1 objek bungkusan data
  const poData = {
    id_pemasok,
    id_gudang,
    tanggal_po:  document.getElementById('tanggal_po').value,
    status_po:   document.getElementById('status_po').value,
    total_bayar: total,
    items: items // <-- SEKARANG ARRAY ITEMS-NYA SUDAH IKUT TERKIRIM KE BACKEND!
  };

  try {
    // Cukup panggil 1 endpoint POST saja, backend kita yang akan langsung split masuk ke detail_item_po
    const poRes = await fetch(`${BASE_URL}/purchase-order`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(poData)
    });
    
    const poResult = await poRes.json();
    
    if (!poRes.ok) { 
      showMessage('error', poResult.message || 'Gagal membuat PO'); 
      return; 
    }

    showMessage('success', 'Purchase order dan detail item berhasil disimpan!');
    setTimeout(() => { window.location.href = 'purchase.html'; }, 1500);

  } catch (err) {
    console.error(err);
    showMessage('error', 'Terjadi kesalahan pada koneksi server');
  }
}

function showMessage(type, text) {
  messageBox.style.display = 'block';
  messageBox.className = `message ${type}`;
  messageBox.innerHTML = text;
}

// 🔥 Inisialisasi halaman berurutan agar dropdown produk siap dipakai
async function init() {
  await loadPemasok();
  await loadGudang();
  await loadProduk(); // Load data master produk
  addProductRow();    // Generate baris pertama dengan dropdown yang sudah siap
}

init();
</script>

</body>
</html>
