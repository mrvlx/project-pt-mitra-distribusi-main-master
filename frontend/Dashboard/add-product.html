<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Tambah Produk - PT Mitra Distribusi</title>

  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>

    :root{
      --bg:#F4F6FB;
      --surface:#FFFFFF;
      --primary:#2B5EE8;
      --text-dark:#1A1D2E;
      --text-mid:#5A607A;
      --border:#E8ECF4;
      --radius:14px;
      --shadow:0 2px 12px rgba(30,40,80,.07);
      --font:'Plus Jakarta Sans', sans-serif;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:var(--font);
      background:var(--bg);
      padding:40px;
      color:var(--text-dark);
    }

    .container{
      max-width:700px;
      margin:auto;
    }

    .page-title{
      font-size:28px;
      font-weight:800;
      margin-bottom:24px;
    }

    .card{
      background:var(--surface);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      border:1px solid var(--border);
      padding:32px;
    }

    .form-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:20px;
    }

    .form-group{
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    .form-group.full{
      grid-column:1 / -1;
    }

    label{
      font-size:14px;
      font-weight:600;
      color:var(--text-mid);
    }

    input,
    select{
      width:100%;
      padding:14px;
      border:1.5px solid var(--border);
      border-radius:10px;
      outline:none;
      font-family:var(--font);
      font-size:14px;
      transition:.2s;
      background:white;
    }

    input:focus,
    select:focus{
      border-color:var(--primary);
    }

    .button-group{
      display:flex;
      justify-content:flex-end;
      gap:12px;
      margin-top:28px;
    }

    .btn{
      padding:14px 20px;
      border:none;
      border-radius:10px;
      font-family:var(--font);
      font-weight:700;
      cursor:pointer;
      transition:.2s;
      text-decoration:none;
      font-size:14px;
    }

    .btn-secondary{
      background:#E9EDF7;
      color:var(--text-dark);
    }

    .btn-secondary:hover{
      background:#DCE3F2;
    }

    .btn-primary{
      background:var(--primary);
      color:white;
    }

    .btn-primary:hover{
      background:#1F4DC5;
    }

    .message{
      margin-top:20px;
      padding:14px;
      border-radius:10px;
      font-size:14px;
      display:none;
    }

    .success{
      background:#E5F9F0;
      color:#2ECC71;
    }

    .error{
      background:#FDECEA;
      color:#E74C3C;
    }

  </style>
</head>

<body>

<div class="container">

  <h1 class="page-title">
    Tambah Produk
  </h1>

  <div class="card">

    <form id="formTambahProduk">

      <div class="form-grid">

        <div class="form-group full">
          <label>Nama Produk</label>

          <input
            type="text"
            id="nama_produk"
            placeholder="Masukkan nama produk"
            required
          >
        </div>

        <div class="form-group">
          <label>Kategori</label>

          <select id="id_kategori" required>
            <option value="">
              Memuat kategori...
            </option>
          </select>
        </div>

        <div class="form-group">
          <label>Pemasok</label>

          <select id="id_pemasok" required>
            <option value="">
              Memuat pemasok...
            </option>
          </select>
        </div>

        <div class="form-group">
          <label>Harga Beli</label>

          <input
            type="number"
            id="harga_beli"
            placeholder="0"
            required
          >
        </div>

        <div class="form-group">
          <label>Harga Jual</label>

          <input
            type="number"
            id="harga_jual"
            placeholder="0"
            required
          >
        </div>

        <div class="form-group full">
          <label>Stok Total</label>

          <input
            type="number"
            id="stok_total"
            placeholder="0"
            required
          >
        </div>

      </div>

      <div class="button-group">

        <a
          href="inventory.html"
          class="btn btn-secondary"
        >
          Kembali
        </a>

        <button
          type="submit"
          class="btn btn-primary"
        >
          Simpan Produk
        </button>

      </div>

    </form>

    <div id="message-box" class="message"></div>

  </div>

</div>

<script>

const BASE_URL = 'http://localhost:3000';

const kategoriSelect =
document.getElementById('id_kategori');

const pemasokSelect =
document.getElementById('id_pemasok');

const messageBox =
document.getElementById('message-box');


// LOAD KATEGORI
async function loadKategori(){

    try{

        const response = await fetch(
            `${BASE_URL}/kategori`
        );

        const kategori = await response.json();

        kategoriSelect.innerHTML =
        '<option value="">Pilih Kategori</option>';

        kategori.forEach(item => {

            kategoriSelect.innerHTML += `
                <option value="${item.id_kategori}">
                    ${item.nama_kategori}
                </option>
            `;

        });

    }catch(error){

        console.log(error);

        kategoriSelect.innerHTML =
        '<option>Gagal memuat kategori</option>';

    }

}


// LOAD PEMASOK
async function loadPemasok(){

    try{

        const response = await fetch(
            `${BASE_URL}/pemasok`
        );

        const pemasok = await response.json();

        pemasokSelect.innerHTML =
        '<option value="">Pilih Pemasok</option>';

        pemasok.forEach(item => {

            pemasokSelect.innerHTML += `
                <option value="${item.id_pemasok}">
                    ${item.nama_pemasok}
                </option>
            `;

        });

    }catch(error){

        console.log(error);

        pemasokSelect.innerHTML =
        '<option>Gagal memuat pemasok</option>';

    }

}


// SUBMIT FORM
document
.getElementById('formTambahProduk')
.addEventListener('submit', async (e)=>{

    e.preventDefault();

    const data = {

        nama_produk:
        document.getElementById('nama_produk').value,

        id_kategori:
        document.getElementById('id_kategori').value,

        id_pemasok:
        document.getElementById('id_pemasok').value,

        harga_beli:
        document.getElementById('harga_beli').value,

        harga_jual:
        document.getElementById('harga_jual').value,

        stok_total:
        document.getElementById('stok_total').value

    };

    try{

        const response = await fetch(
            `${BASE_URL}/produk`,
            {
                method:'POST',

                headers:{
                    'Content-Type':'application/json'
                },

                body: JSON.stringify(data)
            }
        );

        const result = await response.json();

        if(response.ok){

            messageBox.style.display = 'block';
            messageBox.className =
            'message success';

            messageBox.innerHTML =
            'Produk berhasil ditambahkan';

            document
            .getElementById('formTambahProduk')
            .reset();

            setTimeout(()=>{

                window.location.href =
                'inventory.html';

            }, 1500);

        }else{

            messageBox.style.display = 'block';
            messageBox.className =
            'message error';

            messageBox.innerHTML =
            result.message || 'Gagal menambahkan produk';

        }

    }catch(error){

        console.log(error);

        messageBox.style.display = 'block';
        messageBox.className =
        'message error';

        messageBox.innerHTML =
        'Terjadi kesalahan server';

    }

});


// INIT
loadKategori();
loadPemasok();

</script>

</body>
</html>
