<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tambah Sales Order - PT Mitra Distribusi</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #F4F6FB;
      --surface: #FFFFFF;
      --primary: #2B5EE8;
      --text-dark: #1A1D2E;
      --text-mid: #5A607A;
      --border: #E8ECF4;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(30,40,80,.07);
      --font: 'Plus Jakarta Sans', sans-serif;
      --red: #EF4444;
      --green: #22C55E;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: var(--font); background: var(--bg); padding: 40px; color: var(--text-dark); }
    .container { max-width: 780px; margin: auto; }
    .page-title { font-size: 28px; font-weight: 800; margin-bottom: 24px; }
    .card { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); border: 1px solid var(--border); padding: 32px; margin-bottom: 20px; }
    .section-title { font-size: 15px; font-weight: 700; color: var(--text-dark); margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .form-group { display: flex; flex-direction: column; gap: 8px; }
    .form-group.full { grid-column: 1 / -1; }
    label { font-size: 13px; font-weight: 600; color: var(--text-mid); }
    input, select {
      width: 100%; padding: 12px 14px;
      border: 1.5px solid var(--border); border-radius: 10px;
      outline: none; font-family: var(--font); font-size: 14px;
      transition: .2s; background: white;
    }
    input:focus, select:focus { border-color: var(--primary); }

    /* Product rows */
    .product-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 16px; }
    .product-row {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 1fr 40px;
      gap: 10px; align-items: center;
    }
    .product-row input, .product-row select { padding: 10px 12px; font-size: 13px; }
    .product-row .subtotal-display {
      font-size: 13px; font-weight: 600; color: var(--text-dark);
      background: var(--bg); border: 1.5px solid var(--border);
      border-radius: 10px; padding: 10px 12px; text-align: right;
    }
    .btn-remove {
      width: 36px; height: 36px; border-radius: 8px;
      background: #FEE2E2; color: var(--red); border: none;
      font-size: 18px; cursor: pointer; display: flex;
      align-items: center; justify-content: center; font-weight: 700;
      transition: .2s; flex-shrink: 0;
    }
    .btn-remove:hover { background: #FECACA; }

    .product-header {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 1fr 40px;
      gap: 10px; margin-bottom: 8px;
    }
    .product-header span { font-size: 12px; font-weight: 600; color: var(--text-mid); }

    .btn-add-product {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 16px; background: var(--bg);
      border: 1.5px dashed var(--border); border-radius: 10px;
      color: var(--primary); font-family: var(--font);
      font-size: 13px; font-weight: 600; cursor: pointer;
      transition: .2s; width: 100%;
    }
    .btn-add-product:hover { border-color: var(--primary); background: #EEF2FD; }

    /* Total */
    .total-section {
      display: flex; justify-content: flex-end; align-items: center;
      gap: 16px; padding-top: 16px; border-top: 1px solid var(--border);
      margin-top: 16px;
    }
    .total-label { font-size: 14px; font-weight: 600; color: var(--text-mid); }
    .total-value { font-size: 20px; font-weight: 800; color: var(--text-dark); }

    .button-group { display: flex; justify-content: flex-end; gap: 12px; margin-top: 8px; }
    .btn { padding: 13px 22px; border: none; border-radius: 10px; font-family: var(--font); font-weight: 700; cursor: pointer; transition: .2s; text-decoration: none; font-size: 14px; }
    .btn-secondary { background: #E9EDF7; color: var(--text-dark); }
    .btn-secondary:hover { background: #DCE3F2; }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: #1F4DC5; }
    .message { margin-top: 20px; padding: 14px; border-radius: 10px; font-size: 14px; display: none; }
    .success { background: #E5F9F0; color: #16A34A; }
    .error { background: #FDECEA; color: #DC2626; }
  </style>
</head>
<body>

<div class="container">
  <h1 class="page-title">Tambah Sales Order</h1>

  <div class="card">
    <div class="section-title">📋 Informasi Order</div>
    <div class="form-grid">

      <div class="form-group">
        <label>Tanggal SO</label>
        <input type="date" id="tanggal_so" required>
      </div>

      <div class="form-group">
        <label>Jatuh Tempo</label>
        <input type="date" id="jatuh_tempo" required>
      </div>

      <div class="form-group">
        <label>Pelanggan</label>
        <select id="id_pelanggan" required>
          <option value="">-- Pilih Pelanggan --</option>
        </select>
      </div>

      <div class="form-group">
        <label>Gudang</label>
        <select id="id_gudang" required>
          <option value="">-- Pilih Gudang --</option>
        </select>
      </div>

      <div class="form-group">
        <label>Status SO</label>
        <select id="status_so" required>
          <option value="Draft">Draft</option>
          <option value="Processed">Processed</option>
          <option value="Delivered">Delivered</option>
        </select>
      </div>

      <div class="form-group">
        <label>Status Bayar</label>
        <select id="status_bayar" required>
          <option value="Belum Lunas">Belum Lunas</option>
          <option value="Lunas">Lunas</option>
        </select>
      </div>

    </div>
  </div>

  <div class="card" style="margin-top: 24px;">
    <div class="section-title" style="font-weight: 700; margin-bottom: 16px;">📦 Detail Produk</div>

    <div class="product-header" style="display: grid; grid-template-columns: 2fr 1fr 1.5fr 1.5fr auto; gap: 12px; margin-bottom: 12px; font-weight: 600; color: var(--text-mid);">
      <span>Nama Produk</span>
      <span>Qty</span>
      <span>Harga Satuan (Rp)</span>
      <span>Subtotal</span>
      <span>Aksi</span>
    </div>

    <div class="product-list" id="productList">
    </div>

    <button type="button" class="btn-add-product" onclick="addProductRow()" style="margin-top: 14px; padding: 10px 16px; background: #EEF2FD; color: var(--primary); border: none; border-radius: 8px; font-weight: 700; cursor: pointer;">
      + Tambah Produk
    </button>

    <div class="total-section" style="margin-top: 24px; display: flex; justify-content: flex-end; align-items: center; gap: 12px; border-top: 1px solid var(--border); padding-top: 16px;">
      <span class="total-label" style="font-weight: 600; color: var(--text-mid);">Total Bayar:</span>
      <span class="total-value" id="totalDisplay" style="font-size: 18px; font-weight: 800; color: var(--primary);">Rp 0</span>
    </div>
  </div>

  <div class="button-group">
    <a href="orders.html" class="btn btn-secondary">Kembali</a>
    <button type="button" class="btn btn-primary" onclick="submitSO()">Simpan Sales Order</button>
  </div>

  <div id="message-box" class="message"></div>
</div>

<script>
const BASE_URL = 'http://localhost:3000';
let masterProduk = []; 
const messageBox = document.getElementById('message-box');

// 1. Jalankan otomatis saat halaman selesai dimuat
document.addEventListener('DOMContentLoaded', async () => {
  await loadMasterData();
  addProductRow(); 
});

// 2. Ambil data dari API Backend untuk mengisi Dropdown
async function loadMasterData() {
  try {
      console.log("Mengambil data pelanggan...");
      const pelanggan = await fetch(`${BASE_URL}/pelanggan`).then(r => r.json());
      
      const selectPelanggan = document.getElementById('id_pelanggan');
      if (selectPelanggan && Array.isArray(pelanggan)) {
        selectPelanggan.innerHTML = '<option value="">-- Pilih Pelanggan --</option>' + 
          pelanggan.map(p => `
            <option value="${p.id_pelanggan}">${p.nama_perusahaan}</option>
          `).join('');
      }

    console.log("Mengambil master data gudang...");
    const dataGudang = await fetch(`${BASE_URL}/gudang`).then(r => r.json());
    
    const selectGudang = document.getElementById('id_gudang');
    if (selectGudang && Array.isArray(dataGudang)) {
      selectGudang.innerHTML = '<option value="">-- Pilih Gudang --</option>' + 
        dataGudang.map(g => `
          <option value="${g.id_gudang}">${g.nama_gudang}</option>
        `).join('');
    }

    console.log("Mengambil data produk...");
    const produk = await fetch(`${BASE_URL}/produk`).then(r => r.json());
    
    masterProduk = Array.isArray(produk) ? produk : [];
    
    const firstRow = document.querySelector('.product-row');
    if (firstRow) {
      const selectNode = firstRow.querySelector('.prod-select');
      if (selectNode) {
        selectNode.innerHTML = '<option value="">-- Pilih Produk --</option>' + 
          masterProduk.map(p => `
            <option value="${p.id_produk}" data-harga="${p.harga_jual || p.harga_beli || p.harga}">${p.nama_produk}</option>
          `).join('');
      }
    }

  } catch (err) {
    console.error("Gagal memuat data master ke dropdown:", err);
  }
}

// 3. Tambah baris produk berupa DROPDOWN
function addProductRow() {
  const container = document.getElementById('productList'); 
  const rowId = 'row_' + Date.now() + '_' + Math.floor(Math.random() * 100);

  // Menggunakan harga_jual terlebih dahulu karena ini form penjualan (SO)
  const opsiProduk = masterProduk.map(p => 
    `<option value="${p.id_produk}" data-harga="${p.harga_jual || p.harga_beli || p.harga}">${p.nama_produk} (Stok: ${p.stok_total})</option>`
  ).join('');

  const rowHtml = `
    <div class="product-row" id="${rowId}" style="display: grid; grid-template-columns: 2fr 1fr 1.5fr 1.5fr auto; gap: 12px; margin-bottom: 12px; align-items: center;">
      <div>
        <select class="prod-select" onchange="updateRowPrice('${rowId}')" required style="width:100%;">
          <option value="">-- Pilih Produk --</option>
          ${opsiProduk}
        </select>
      </div>
      <div>
        <input type="number" class="prod-qty" min="1" value="1" oninput="calculateRowSubtotal('${rowId}')" required style="width:100%;">
      </div>
      <div>
        <input type="text" class="prod-price" placeholder="Harga" readonly style="background: #F4F6FB; width:100%;">
      </div>
      <div>
        <input type="text" class="prod-subtotal" placeholder="0" readonly style="background: #F4F6FB; font-weight:600; width:100%;">
      </div>
      <div>
        <button type="button" onclick="removeProductRow('${rowId}')" style="background:#FDECEA; color:#E84B3A; border:none; padding: 8px 12px; border-radius:6px; cursor:pointer;">✕</button>
      </div>
    </div>
  `;

  container.insertAdjacentHTML('beforeend', rowHtml);
}

// 4. Update harga ketika dropdown produk dipilih
function updateRowPrice(rowId) {
  const row = document.getElementById(rowId);
  const selectNode = row.querySelector('.prod-select');
  const selectedOption = selectNode.options[selectNode.selectedIndex];
  
  const harga = selectedOption.getAttribute('data-harga') || 0;
  row.querySelector('.prod-price').value = harga;
  
  calculateRowSubtotal(rowId);
}

// 5. Hitung Subtotal per baris (Harga x Qty)
function calculateRowSubtotal(rowId) {
  const row = document.getElementById(rowId);
  const qty = parseFloat(row.querySelector('.prod-qty').value) || 0;
  const harga = parseFloat(row.querySelector('.prod-price').value) || 0;
  
  const subtotal = qty * harga;
  row.querySelector('.prod-subtotal').value = subtotal;

  calculateGrandTotal();
}

// 6. Hitung Akumulasi Total Bayar Keseluruhan
function calculateGrandTotal() {
  let grandTotal = 0;
  document.querySelectorAll('.product-row').forEach(row => {
    const sub = parseFloat(row.querySelector('.prod-subtotal').value) || 0;
    grandTotal += sub;
  });
  document.getElementById('totalDisplay').innerText = 'Rp ' + grandTotal.toLocaleString('id-ID');
}

// 7. Hapus baris produk dinamis
function removeProductRow(rowId) {
  const row = document.getElementById(rowId);
  if (document.querySelectorAll('.product-row').length > 1) {
    row.remove();
    calculateGrandTotal();
  } else {
    alert("Minimal harus ada 1 produk dalam transaksi!");
  }
}

// 8. FUNGSI UNTUK MENYIMPAN SALES ORDER KE BACKEND
async function submitSO() {
  const tanggal_so = document.getElementById('tanggal_so').value;
  const jatuh_tempo = document.getElementById('jatuh_tempo').value;
  const id_pelanggan = document.getElementById('id_pelanggan').value;
  const id_gudang = document.getElementById('id_gudang').value;
  const status_so = document.getElementById('status_so').value;
  const status_bayar = document.getElementById('status_bayar').value;

  if (!tanggal_so || !id_pelanggan || !id_gudang) {
    alert("Waduh, Tanggal SO, Pelanggan, atau Gudang masih ada yang kosong nih!");
    return;
  }

  const items = [];
  let total_bayar = 0;

  document.querySelectorAll('.product-row').forEach(row => {
    const id_produk = row.querySelector('.prod-select').value;
    const qty = parseInt(row.querySelector('.prod-qty').value) || 0;
    const harga_satuan = parseFloat(row.querySelector('.prod-price').value) || 0;
    const subtotal = qty * harga_satuan;

    if (id_produk && qty > 0) {
      // Trik Multi-Alias Mapping: Mengirimkan variasi nama properti agar fleksibel dengan app.js backend
      items.push({
        id_produk: id_produk,
        id_product: id_produk,
        product_id: id_produk,
        
        qty: qty,
        quantity: qty,
        jumlah: qty,
        
        harga_satuan: harga_satuan,
        harga: harga_satuan,
        price: harga_satuan,
        
        subtotal: subtotal
      });
      total_bayar += subtotal;
    }
  });

  if (items.length === 0) {
    alert("Eh, minimal pilih 1 produk dulu dong sebelum disimpan!");
    return;
  }

  // Mengirimkan variasi nama array penampung items agar dibaca sempurna oleh backend
  const payload = {
    tanggal_so,
    jatuh_tempo,
    id_pelanggan,
    id_gudang,
    status_so,
    status_bayar,
    total_bayar,
    items: items,
    details: items,
    detail: items,
    products: items
  };

  console.log("Data yang siap dikirim ke backend:", payload);

  try {
    const response = await fetch(`${BASE_URL}/sales-order`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });

    // Validasi ketat jika server mengembalikan error HTTP (400 / 500)
    if (!response.ok) {
      const errorText = await response.text();
      throw new Error(errorText || `Server error dengan status: ${response.status}`);
    }

    showMessage('success', 'Sales order berhasil ditambahkan!');
    setTimeout(() => { window.location.href = 'orders.html'; }, 1500);

  } catch (err) {
    console.error("Gagal menyimpan:", err);
    showMessage('error', 'Terjadi kesalahan server: ' + err.message);
    alert("Gagal menyimpan ke database! Cek pesan error merah di bawah atau terminal backend-mu.");
  }
}

function showMessage(type, text) {
  messageBox.style.display = 'block';
  messageBox.className = `message ${type}`;
  messageBox.innerHTML = text;
}
</script>

</body>
</html>
